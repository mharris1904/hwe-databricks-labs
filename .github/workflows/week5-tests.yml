name: Week 5 Tests (Silver Layer)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'labs/week5/**'
      - 'tests/test_week5_silver.py'
      - 'tests/notebook_utils.py'
      - '.github/workflows/week5-tests.yml'
  push:
    paths:
      - 'labs/week5/**'
      - 'tests/test_week5_silver.py'

jobs:
  test-week5:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements-test.txt

      - name: Set up Spark
        run: |
          echo "SPARK_LOCAL_IP=127.0.0.1" >> $GITHUB_ENV


      - name: Run Week 5 tests
        run: |
          pytest tests/test_week5_silver.py -v --tb=short

      - name: Test Summary
        if: always()
        run: |
          echo "✅ Week 5 Silver layer tests completed"
